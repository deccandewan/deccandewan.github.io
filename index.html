<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="tXZF528YtRZFMSgx7P_5zXasUsDRmEWKztKGYqxjN4g" />
    <title>DeccanDewan | Apps</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #111827;
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .icon {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, #10b981, #047857);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            font-weight: bold;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }
        p {
            color: #9ca3af;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            padding: 16px 24px;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">خ</div>
        <h1>Khalaf Quran</h1>
        <p>A lightweight offline Qur'an reader for the Riwayah of Khalaf 'an Hamzah.</p>
        <a href="https://github.com/deccandewan/khalafquran" class="btn">View on GitHub & Download APK</a>
    </div>

</body>
</html>
