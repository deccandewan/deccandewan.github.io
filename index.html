<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Keep your exact verification tag here -->
    <meta name="google-site-verification" content="tXZF528YtRZFMSgx7P_5zXasUsDRmEWKztKGYqxjN4g" />
    <title>DeccanDewan | Apps</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #10b981;
            --accent-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .app-icon-wrapper {
            margin-bottom: 24px;
            display: inline-block;
        }

        /* Fallback stylized element if image isn't loaded yet */
        .app-icon-placeholder {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, #10b981, #047857);
            border-radius: 20px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #e5e7eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-weight: 400;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="app-icon-wrapper">
                <!-- Using a clean styled badge vector base as fallback -->
                <div class="app-icon-placeholder">خ</div>
            </div>
            
            <h1>Khalaf Quran</h1>
            <p class="subtitle">A lightweight, offline-first Qur'an reader meticulously optimized for the Riwayah of Khalaf 'an Hamzah.</p>
            
            <a href="https://github.com/deccandewan/khalafquran" class="btn">View on GitHub & Download APK</a>
        </div>
        
        <div class="footer">DeccanDewan Projects</div>
    </div>

</body>
</html>
