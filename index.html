<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="81mz2h6ZHBT0SZ51XGukOw3JQU4UMUKBAqp56ITpnMI" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deccan Dewan — Khalaf Quran Android App</title>
    <meta name="description" content="Download the Khalaf Quran Android app by Deccan Dewan (Abu Hashim). A free offline reader for the rare recitation (Riwayah) of Khalaf an Hamza.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&family=DM+Mono:wght@400;500&family=Scheherazade+New:wght@400&family=Cinzel:wght@400;600&family=Amiri:wght@400&display=swap" rel="stylesheet">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Khalaf Quran",
      "alternateName": [
        "Khalaf an Hamza Reader", 
        "Riwayat Khalaf an Hamzah", 
        "Riwayah Khalaf ʿan Ḥamzah"
      ],
      "operatingSystem": "Android",
      "applicationCategory": "BooksApplication",
      "url": "https://deccandewan.github.io/",
      "author": {
        "@type": "Person",
        "name": "Abu Hashim",
        "alternateName": "DeccanDewan"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Deccan Dewan",
        "url": "https://deccandewan.github.io/"
      }
    }
    </script>

    <style>
        :root {
            --bg-deep:     #0A140A;
            --bg-card:     #161C16;
            --green:       #1B5E20;
            --green-mid:   #66BB6A;
            --green-light: #81C784;
            --green-label: #6FCF87;
            --text:        #E8F5E9;
            --muted:       #6B8C6B;
            --border:      rgba(129,199,132,0.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Spectral', Georgia, serif;
            background-color: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            overflow: hidden;
        }

        /* ── animated canvas background ── */
        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── card ── */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(22, 28, 22, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 36px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.5),
                0 24px 56px rgba(0,0,0,0.6),
                0 0 100px rgba(27,94,32,0.12);
            animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(22px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102,187,106,0.5), transparent);
        }

        /* ── splash ornament ── */
        .ornament {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
            animation: ornament-in 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s both;
        }

        @keyframes ornament-in {
            from { opacity: 0; transform: scale(0.28); }
            to   { opacity: 1; transform: scale(1); }
        }

        .ornament canvas {
            position: absolute;
            inset: 0;
        }

        .khaaf {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: khaaf-in 0.5s ease-out 0.55s both;
        }

        @keyframes khaaf-in {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }

        .khaaf span {
            font-family: 'Scheherazade New', serif;
            font-size: 42px;
            color: #81C784;
            line-height: 1;
            filter: drop-shadow(0 2px 14px rgba(46,125,50,0.7));
            margin-top: -8px;
        }

        .ornament::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(46,125,50,0.15) 0%, transparent 70%);
            animation: breathe 3.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50%       { opacity: 1;   transform: scale(1.1); }
        }

        /* ── text ── */
        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .riwayah {
            font-family: 'Amiri', serif;
            font-size: 13px;
            letter-spacing: 0.06em;
            font-style: italic;
            color: var(--green-mid);
            margin-bottom: 18px;
        }

        p {
            font-size: 15px;
            line-height: 1.65;
            color: #8FAE8F;
            margin-bottom: 24px;
        }
        
        p strong {
            color: var(--green-light);
            font-weight: 600;
        }

        /* ── pills ── */
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .pill {
            font-family: 'DM Mono', monospace;
            font-size: 10.5px;
            letter-spacing: 0.04em;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(27,94,32,0.22);
            border: 1px solid rgba(102,187,106,0.16);
            color: var(--green-label);
        }

        /* ── button ── */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(145deg, #1E6621, #164B18);
            color: var(--green-light);
            text-decoration: none;
            border-radius: 14px;
            font-family: 'DM Mono', monospace;
            font-size: 12.5px;
            letter-spacing: 0.04em;
            border: 1px solid rgba(102,187,106,0.22);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(129,199,132,0.10);
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
        }

        .btn:hover {
            background: linear-gradient(145deg, #256B28, #1A571B);
            box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 0 24px rgba(102,187,106,0.14);
            transform: translateY(-1px);
        }

        .btn:active { transform: translateY(0); }
        .btn svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.8; }

        .footer {
            margin-top: 18px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .footer a {
            color: var(--muted);
            text-decoration: none;
            border-bottom: 1px solid rgba(107,140,107,0.25);
            transition: color 0.2s;
        }

        .footer a:hover { color: var(--green-label); }
    </style>
</head>
